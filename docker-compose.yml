version: '3.8'

services:
  jupyter:
    build: .
    container_name: ml_jupyter
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    working_dir: /app

  streamlit:
    build: .
    container_name: ml_streamlit
    command: streamlit run app/main.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - jupyter
